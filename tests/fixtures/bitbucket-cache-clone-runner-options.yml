options:
  max-time: 20
  size: 2x

clone:
  depth: full
  lfs: true

definitions:
  caches:
    cargo: ~/.cargo/registry
    node: node_modules

pipelines:
  default:
    - step:
        name: cache-build
        size: 2x
        runs-on:
          - self.hosted
          - linux
        clone:
          enabled: false
        caches:
          - cargo
          - node
        script:
          - cargo test
  pull-requests:
    "**":
      - step:
          name: pr-cache-restore
          caches:
            - node
          script:
            - npm test
