stages:
  - build
  - deploy

build:
  stage: build
  script:
    - mkdir -p dist
    - make package
  artifacts:
    name: "dist-$CI_COMMIT_SHA"
    paths:
      - dist/
      - sbom.json
    exclude:
      - dist/tmp/**

deploy:
  stage: deploy
  needs:
    - job: build
      artifacts: true
  dependencies:
    - build
  environment: production
  script:
    - ./deploy.sh dist/
