name: gha-service-containers-and-credentials

on:
  push:

permissions:
  contents: read

jobs:
  integration:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/example/private-build:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GHCR_TOKEN }}
      volumes:
        - build-cache:/workspace/cache
      options: --cpus 2
    services:
      postgres:
        image: ghcr.io/example/private-postgres:15
        credentials:
          username: ${{ github.actor }}
          password: ${{ secrets.POSTGRES_REGISTRY_TOKEN }}
        ports:
          - 5432:5432
        volumes:
          - pgdata:/var/lib/postgresql/data
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
    steps:
      - name: Run integration tests
        run: cargo test --all
