# Authority Invariant: a Secret must never propagate to an Untrusted Image.
#
# WHY
# ---
# An "Untrusted Image" is a container image (or `uses:` action) that lacks a
# digest pin (Docker `@sha256:...` or a SHA-pinned action ref). Its contents
# can change between runs without your approval. When a Secret reaches such
# an image's step, the image's owner can exfiltrate the secret on any future
# run by mutating the image tag.
#
# This is the floating-image-with-credentials pattern. It is silent: the
# pipeline keeps working, the secret keeps being injected, and nothing
# changes — until the upstream image is rotated to a malicious build.
#
# HOW IT FIRES
# ------------
# Fires on every propagation path whose source is a Secret AND whose sink is
# in the `untrusted` trust zone (taudit classifies tag-pinned images and
# unpinned actions as Untrusted) AND whose path crosses into untrusted.
#
# This invariant focuses on the secret half of the equation; the
# `floating_image` built-in catches the unpinned-image half independently.
# Run both — they catch the issue from different directions.

id: no_untrusted_image_with_secret
name: Secret reachable from untrusted (floating) image or action
description: >
  Pin the consuming image or action to a digest, or remove the secret from
  this job. Tag-pinned images can change underneath you and exfiltrate any
  secret they receive.
severity: critical
category: floating_image
match:
  source:
    node_type: secret
  sink:
    trust_zone: untrusted
  path:
    crosses_to:
      - untrusted
