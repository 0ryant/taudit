# Authority Invariant: production-tagged Secrets must not exist in pipeline
# graphs that already have an OIDC-capable Identity available.
#
# WHY
# ---
# OIDC federation (GitHub `id-token: write`, ADO workload identity federation,
# cloud-provider trust policies) eliminates long-lived static secrets by
# exchanging a short-lived signed JWT for a cloud credential at job time.
# Once an OIDC path exists, every static secret in the same graph is a
# regression: they are long-lived, exfiltratable, and rotation-prone.
#
# This invariant codifies the "OIDC-only" target state: if the graph contains
# an OIDC-capable identity AND it also contains a production-tagged static
# secret reaching anything, the secret is a migration candidate.
#
# HOW IT FIRES
# ------------
# Fires for every propagation path whose source is a Secret tagged with
# `environment: production` (policy metadata you attach) AND whose sink is
# any reachable node. The intent is policy enforcement, not boundary
# detection — so no `path.crosses_to` predicate.
#
# RELATIONSHIP TO BUILT-INS
# -------------------------
# Pair this with the `long_lived_credential` built-in (which catches secrets
# whose names look static — API keys, passwords) and `uplift_without_attestation`
# (which catches OIDC builds without provenance).
#
# CUSTOMIZATION
# -------------
# If you do not tag secrets with `environment: production`, change the
# metadata key below to match your tagging scheme (e.g. `tier: prod`).

id: prefer_oidc_over_static_secrets
name: Production secret present alongside OIDC-capable identity
description: >
  Migrate this secret to an OIDC-federated credential exchange. Static
  secrets are long-lived and exfiltratable; OIDC tokens are short-lived
  and bound to the workflow's identity.
severity: high
category: long_lived_credential
match:
  source:
    node_type: secret
    metadata:
      environment: production
