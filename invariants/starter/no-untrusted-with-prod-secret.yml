# Authority Invariant: a Secret tagged for production must never be reachable
# from an Untrusted node.
#
# WHY
# ---
# Production secrets are the highest-value authority in your pipeline graph.
# Untrusted nodes — typically tag-pinned third-party actions or fork-PR
# contexts — execute code you do not control. When taudit's BFS connects a
# Secret carrying `environment: production` (or `tier: prod`, etc.) to an
# Untrusted sink, the secret is, in effect, available to whoever controls
# that mutable code.
#
# HOW IT FIRES
# ------------
# This invariant fires for every propagation path whose source is a Secret
# whose metadata contains `environment: production` AND whose sink lives in
# the `untrusted` trust zone AND whose path crosses into the untrusted zone.
#
# REQUIRED METADATA
# -----------------
# Your pipeline parser (or upstream tagging) must emit `environment: production`
# on the relevant Secret nodes. taudit does not infer this — it is policy
# metadata you attach. If your tagging key is different (e.g. `tier: prod`),
# edit the `metadata:` block below.

id: no_untrusted_with_prod_secret
name: Production secret reachable from untrusted code
description: >
  Secrets tagged for production must not propagate to untrusted execution
  contexts. Move the secret behind an OIDC exchange, narrow its scope, or
  remove the untrusted step from the path that consumes it.
severity: critical
category: untrusted_with_authority
match:
  source:
    node_type: secret
    metadata:
      environment: production
  sink:
    trust_zone: untrusted
  path:
    crosses_to:
      - untrusted
