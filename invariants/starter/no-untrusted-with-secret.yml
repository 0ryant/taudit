# Sample Authority Invariant — placeholder for the v0.7 starter pack.
#
# Fires when any secret reaches a step in the untrusted trust zone via
# the propagation engine. This is intentionally minimal so the CLI smoke
# tests have a real file to load; the full starter set is populated by
# the Authority Invariants worktree (worktree-agent-af4ffcbe3d4fb6b95)
# at v0.7 merge time.
id: no_untrusted_with_secret
name: Secret reaches untrusted step
description: "Secrets must not propagate into the untrusted trust zone"
severity: critical
category: authority_propagation
match:
  source:
    node_type: secret
  sink:
    node_type: step
    trust_zone: untrusted
  path:
    crosses_to:
      - untrusted
