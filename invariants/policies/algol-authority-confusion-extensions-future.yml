# Algol Authority-Confusion Extensions — per-action variants (rc6+)
#
# Compatible:  taudit 1.1.0-rc.6 and later (CustomRule schema as shipped in
#              rc.6 — `gha_action` metadata is now populated on Step nodes
#              by `taudit-parse-gha`).
# Provenance:  Algol disclosure program corpus hunt 2026-05-05/06.
# Author:      rytilcock
#
# These per-action rules use STANDALONE mode (no propagation walk) so they
# fire on every step that uses the named action family — gating the action
# choice itself rather than waiting for the propagation engine to terminate
# at an Image node. Pair with the propagation rules in
# `algol-authority-confusion-extensions.yml` (the `_with_authority`
# signature rule especially) for a full authority-confusion gate.
#
# Severity rationale:
#   `high` is used for action families where the upstream behaviour reaches
#   PATH-resolved helpers with deploy / publish authority and the bare
#   helper hand-off has been corpus-confirmed.
#   `medium` is used for families where the bare hand-off is real but the
#   blast radius is bounded (test-only authority, dry-run modes, etc.).

# ---------------------------------------------------------------------------
# AI/ML publish helper family
# ---------------------------------------------------------------------------
id: algol_huggingface_action_in_use
name: Hugging Face publish action used in this workflow
description: >
  This step uses a Hugging Face publish action (`huggingface/`). The action
  delegates to a bare-name `hf` / `huggingface-cli` invocation that
  resolves through whatever PATH `setup-python` / `setup-uv` mutated.
  authority_delta_type: contract-boundary-violation. Pair with
  `algol_github_path_mutator_with_authority` from the active bundle to
  confirm the precondition fires in the same graph.
severity: high
category: authority_propagation
match:
  standalone:
    node_type: step
    metadata:
      gha_action: { contains: huggingface }
---
id: algol_modal_action_in_use
name: Modal publish action used in this workflow
description: >
  This step uses `modal-labs/setup-modal` or an inline `modal deploy`
  invocation. Modal's CLI resolves through PATH and `$MODAL_CONFIG_PATH`
  inherited from earlier setup-python steps in the same job.
  authority_delta_type: contract-boundary-violation.
severity: high
category: authority_propagation
match:
  standalone:
    node_type: step
    metadata:
      gha_action: { contains: modal-labs }
---
id: algol_replicate_action_in_use
name: Replicate publish action used in this workflow
description: >
  This step uses a `replicate/` org action. Replicate's CLI is a Python
  helper invoked by bare name after `setup-python` mutates PATH.
  authority_delta_type: contract-boundary-violation.
severity: high
category: authority_propagation
match:
  standalone:
    node_type: step
    metadata:
      gha_action: { contains: replicate/ }

