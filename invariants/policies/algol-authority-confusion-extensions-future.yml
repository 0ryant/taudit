# ---------------------------------------------------------------------------
# Sigstore signer in env-gate-writing workflow (exploit shape)
# ---------------------------------------------------------------------------
---
id: algol_sigstore_signer_with_env_gate_writer
name: Sigstore signing helper alongside env-gate writer in same graph
description: >
  This step uses a `sigstore/` org action AND writes the env gate (the
  gha_action substring matches sigstore/* and writes_env_gate is true).
  The sigstore signer resolves cosign plugins and sub-helpers through
  the mutable runner state. authority_delta_type:
  cross-principal-escalation when the workflow is PR-triggered,
  intra-workflow-escalation otherwise.
severity: high
category: self_mutating_pipeline
match:
  standalone:
    node_type: step
    metadata:
      gha_action: { contains: sigstore/ }
      writes_env_gate: "true"
