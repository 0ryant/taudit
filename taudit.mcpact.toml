schema_version = "mcpact.manifest.v1"

[package]
name = "taudit-mcp"
version = "0.0.1"
description = "MCP adapter for taudit — pipeline authority-graph scan / verify / graph / map / diff / baseline / remediate / invariants surface"
# trust = "Reviewed" — operator-reviewed local manifest. Upgrade to "Signed" via
# `mcpact sign taudit.mcpact.toml` after the workspace signing key is provisioned.
trust = "Reviewed"

[cli]
name = "taudit"
binary = "taudit"
version_command = ["--version"]

[audit]
sink = "jsonl"
path = ".mcpact/audit.jsonl"

# -----------------------------------------------------------------------------
# Notes on operator-directive coverage (2026-05-19):
#
# - taudit-cli's `baseline` subcommands are `init / accept / diff / review` —
#   *not* `init / list / promote / rollback` as named in the original task
#   matrix. We map the actual CLI surface and use the closest semantic match:
#     taudit_baseline_init      → `baseline init`    (Mutate, Signed)
#     taudit_baseline_list      → `baseline review`  (Observe — listing waivers
#                                                     across baselines)
#     taudit_baseline_promote   → `baseline accept`  (Mutate, Signed — append
#                                                     a waiver = "promote" a
#                                                     finding into the baseline)
#     taudit_baseline_rollback  → `baseline diff`    (Observe — taudit has no
#                                                     CLI rollback for baselines;
#                                                     `baseline diff` is the
#                                                     authoritative comparison
#                                                     surface, kept as Observe)
# - taudit-cli's `remediate` subcommands are `suggest / diff / apply / rollback
#   / list-backups`. We expose `suggest` and `apply` per the directive. `apply`
#   gates on the CLI's own `--unstable` flag and remains approval-gated here.
# - taudit-cli has `taudit explain` (built-in rule docs) and `taudit invariants
#   list` (loaded invariant table) but *no* `invariants explain` subcommand —
#   the directive's `taudit_invariants_explain` maps onto `taudit explain`,
#   which is also already exposed as `taudit_explain`. To preserve the matrix
#   we surface both names as separate tools; both call `taudit explain` and the
#   second is a deliberate alias for callers expecting the per-invariant name.
# -----------------------------------------------------------------------------

# -----------------------------------------------------------------------------
# taudit_scan — pipeline scan, informational, always exits 0 on structural
# success. Read-only against the workspace; emits JSON / SARIF / CloudEvents.
# -----------------------------------------------------------------------------

[[tools]]
name = "taudit_scan"
title = "Scan pipeline"
description = "Scan pipeline file(s) for authority findings. Informational; exits 0 unless a structural error occurs."
command = ["scan"]

[tools.args.paths]
type = "path"
required = true
description = "Pipeline YAML file or directory to scan"
position = 1
must_exist = true
within_workspace = true

[tools.args.format]
type = "enum"
required = false
description = "Output format"
flag = "--format"
values = ["terminal", "json", "sarif", "cloudevents"]
default = "json"

[tools.args.severity_threshold]
type = "enum"
required = false
description = "Filter findings shown in output to this severity or higher"
flag = "--severity-threshold"
values = ["critical", "high", "medium", "low", "info"]

[tools.args.platform]
type = "enum"
required = false
description = "CI/CD platform; default is auto-detect"
flag = "--platform"
values = ["auto", "github-actions", "azure-devops", "gitlab", "bitbucket"]

[tools.args.max_hops]
type = "integer"
required = false
description = "Maximum propagation depth for BFS analysis"
flag = "--max-hops"

[tools.args.quiet]
type = "bool"
required = false
description = "Summary-only output"
flag = "--quiet"

[tools.args.invariants_dir]
type = "path"
required = false
description = "Directory containing custom Authority Invariant YAML files"
flag = "--invariants-dir"
within_workspace = true

[tools.output]
mode = "json"
max_bytes = 4194304
expose_stderr = false

[tools.policy]
authority = "Observe"
read_only = true
network = false
writes_files = false
approval = "never"
timeout_seconds = 300

[tools.env]
inherit = false
allow = ["NO_COLOR"]

# -----------------------------------------------------------------------------
# taudit_verify — policy-gated enforcement. Read-only against the workspace;
# the exit-code IS the gate. We classify as Plan (it is the planning-time
# enforcement entrypoint, not a mutation).
# -----------------------------------------------------------------------------

[[tools]]
name = "taudit_verify"
title = "Verify policy invariants"
description = "Enforce policy invariants; exit non-zero on any violation. Read-only against the workspace."
command = ["verify"]

[tools.args.paths]
type = "path"
required = true
description = "Pipeline YAML file or directory to verify"
position = 1
must_exist = true
within_workspace = true

[tools.args.policy]
type = "path"
required = true
description = "Policy source: invariant YAML file or directory"
flag = "--policy"
must_exist = true
within_workspace = true

[tools.args.format]
type = "enum"
required = false
description = "Output format for violations"
flag = "--format"
values = ["text", "json", "sarif"]
default = "json"

[tools.args.platform]
type = "enum"
required = false
description = "CI/CD platform; default is auto-detect"
flag = "--platform"
values = ["auto", "github-actions", "azure-devops", "gitlab", "bitbucket"]

[tools.args.max_hops]
type = "integer"
required = false
description = "Maximum propagation depth"
flag = "--max-hops"

[tools.args.include_builtin]
type = "bool"
required = false
description = "Also run the 61 built-in rules"
flag = "--include-builtin"

[tools.args.severity_threshold]
type = "enum"
required = false
description = "Only count violations at or above this severity"
flag = "--severity-threshold"
values = ["critical", "high", "medium", "low", "info"]

[tools.output]
mode = "json"
max_bytes = 4194304
expose_stderr = true

[tools.policy]
authority = "Plan"
read_only = true
network = false
writes_files = false
approval = "never"
timeout_seconds = 300

[tools.env]
inherit = false
allow = ["NO_COLOR"]

# -----------------------------------------------------------------------------
# taudit_graph — emit graph views (JSON / DOT / Mermaid / summary). Writes to
# stdout only (no -o flag in the CLI). Observe authority.
# -----------------------------------------------------------------------------

[[tools]]
name = "taudit_graph"
title = "Emit authority graph"
description = "Emit graph views (JSON, DOT, Mermaid, or summary) over the authority graph."
command = ["graph"]

[tools.args.paths]
type = "path"
required = true
description = "Pipeline YAML file or directory"
position = 1
must_exist = true
within_workspace = true

[tools.args.format]
type = "enum"
required = false
description = "Output format"
flag = "--format"
values = ["json", "dot", "mermaid", "summary"]
default = "json"

[tools.args.view]
type = "enum"
required = false
description = "Graph view: canonical authority or exploit (mutable-state to helper paths)"
flag = "--view"
values = ["authority", "exploit"]

[tools.args.platform]
type = "enum"
required = false
description = "CI/CD platform; default is auto-detect"
flag = "--platform"
values = ["auto", "github-actions", "azure-devops", "gitlab", "bitbucket"]

[tools.args.max_hops]
type = "integer"
required = false
description = "Maximum propagation depth for summary format"
flag = "--max-hops"

[tools.args.job]
type = "string"
required = false
description = "Restrict diagram output to subgraph reachable from a single job (dot / mermaid only)"
flag = "--job"

[tools.args.rich_labels]
type = "bool"
required = false
description = "Include trust zone and key node metadata in diagram labels"
flag = "--rich-labels"

[tools.output]
mode = "json"
max_bytes = 4194304
expose_stderr = false

[tools.policy]
authority = "Observe"
read_only = true
network = false
writes_files = false
approval = "never"
timeout_seconds = 300

[tools.env]
inherit = false
allow = []

# -----------------------------------------------------------------------------
# taudit_map — human-readable authority map (step x authority). Observe.
