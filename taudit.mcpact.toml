[tools.args.platform]
type = "enum"
required = false
description = "CI/CD platform; default is auto-detect"
flag = "--platform"
values = ["auto", "github-actions", "azure-devops", "gitlab", "bitbucket"]

[tools.args.max_hops]
type = "integer"
required = false
description = "Maximum propagation depth"
flag = "--max-hops"

[tools.output]
mode = "json"
max_bytes = 2097152
expose_stderr = false

[tools.policy]
authority = "Observe"
read_only = true
