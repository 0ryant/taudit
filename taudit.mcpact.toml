description = "Allow medium/high-risk transforms (off by default)"
flag = "--allow-risky"

[tools.args.min_confidence]
type = "number"
required = false
description = "Minimum confidence required for any transform to run"
flag = "--min-confidence"

[tools.args.backup_root]
type = "path"
required = false
description = "Override backup root"
flag = "--backup-root"
within_workspace = true

[tools.output]
mode = "json"
max_bytes = 2097152
expose_stderr = true

[tools.policy]
authority = "Mutate"
read_only = false
network = false
writes_files = true
approval = "always"
