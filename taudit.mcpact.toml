[tools.output]
mode = "text"
max_bytes = 524288
expose_stderr = false

[tools.policy]
authority = "Observe"
read_only = true
network = false
writes_files = false
approval = "never"
timeout_seconds = 60

[tools.env]
inherit = false
allow = ["NO_COLOR"]

# -----------------------------------------------------------------------------
# taudit_baseline_init — snapshot current findings into `.taudit/baselines/`.
# Mutate (writes to `.taudit/baselines/`); approval on-mutation; Reviewed
# trust at manifest level so we mark this tool's trust ceiling via `Signed`
# documentation in SKILLS.md but the in-toml policy is approval-gated.
# -----------------------------------------------------------------------------

[[tools]]
name = "taudit_baseline_init"
title = "Initialise baseline"
description = "Snapshot CURRENT findings on the given pipelines into `.taudit/baselines/<pipeline-content-hash>.json`."
command = ["baseline", "init"]

[tools.args.paths]
type = "path"
required = true
description = "Pipeline path(s); files or directories"
position = 1
must_exist = true
within_workspace = true

[tools.args.root]
type = "path"
required = false
description = "Repository root under which `.taudit/baselines/` is created"
flag = "--root"
within_workspace = true

[tools.args.captured_by]
type = "string"
required = false
description = "Identity recorded in the baseline's `captured_by` field"
flag = "--captured-by"

[tools.args.platform]
type = "enum"
required = false
description = "CI/CD platform; default is auto-detect"
flag = "--platform"
values = ["auto", "github-actions", "azure-devops", "gitlab", "bitbucket"]

[tools.args.max_hops]
type = "integer"
required = false
description = "Maximum propagation depth"
flag = "--max-hops"

[tools.args.invariants_dir]
type = "path"
required = false
description = "Directory containing Authority Invariant YAML files"
flag = "--invariants-dir"
within_workspace = true

[tools.output]
mode = "json"
max_bytes = 1048576
expose_stderr = true

[tools.policy]
authority = "Mutate"
read_only = false
network = false
writes_files = true
approval = "on-mutation"
timeout_seconds = 300

[tools.env]
inherit = false
allow = ["USER", "HOSTNAME", "USERNAME", "COMPUTERNAME"]

# -----------------------------------------------------------------------------
# taudit_baseline_list — directive name; maps to `baseline review` (waiver
# inventory across all baselines). Observe.
# -----------------------------------------------------------------------------

[[tools]]
name = "taudit_baseline_list"
title = "List baseline waivers"
description = "List all waivers across every baseline under `.taudit/baselines/`, sorted by expiry."
command = ["baseline", "review"]

[tools.args.root]
type = "path"
required = false
description = "Repository root under which `.taudit/baselines/` lives"
flag = "--root"
within_workspace = true

[tools.output]
mode = "text"
max_bytes = 1048576
expose_stderr = false

[tools.policy]
authority = "Observe"
read_only = true
network = false
writes_files = false
approval = "never"
timeout_seconds = 60

[tools.env]
inherit = false
allow = []

# -----------------------------------------------------------------------------
# taudit_baseline_promote — directive name; maps to `baseline accept`, which
# appends a waiver to a baseline (= "promote" a finding into the accepted
# baseline). Mutate; approval on-mutation; long reason required by CLI.
# -----------------------------------------------------------------------------

[[tools]]
name = "taudit_baseline_promote"
title = "Promote finding into baseline"
description = "Append a finding to a baseline as an accepted waiver (taudit's `baseline accept`). Requires --reason >= 10 chars; critical waivers require --severity-override + --expires-at."
command = ["baseline", "accept"]

[tools.args.pipeline]
type = "path"
required = true
description = "Pipeline path the finding belongs to"
flag = "--pipeline"
must_exist = true
within_workspace = true

[tools.args.fingerprint]
type = "string"
required = true
description = "32-hex finding fingerprint to waive"
flag = "--fingerprint"

[tools.args.rule_id]
type = "string"
required = true
description = "Snake-case rule id"
flag = "--rule-id"

[tools.args.severity]
type = "enum"
required = true
description = "Severity at the time of acceptance"
flag = "--severity"
values = ["critical", "high", "medium", "low", "info"]

[tools.args.reason]
type = "string"
required = true
description = "Free-form justification (>=10 chars; rejects empty / 'wip' / 'todo' / 'fix later')"
flag = "--reason"

[tools.args.severity_override]
type = "enum"
required = false
description = "Required for critical waivers"
flag = "--severity-override"
values = ["critical", "high", "medium", "low", "info"]

[tools.args.expires_at]
type = "string"
required = false
description = "ISO-8601 expiry; mandatory when severity-override=critical, must be <=90 days"
flag = "--expires-at"

[tools.args.root]
type = "path"
required = false
description = "Repository root under which `.taudit/baselines/` lives"
flag = "--root"
within_workspace = true

[tools.output]
mode = "json"
max_bytes = 524288
expose_stderr = true

[tools.policy]
authority = "Mutate"
read_only = false
network = false
writes_files = true
approval = "on-mutation"
timeout_seconds = 60

[tools.env]
inherit = false
allow = []

# -----------------------------------------------------------------------------
# taudit_baseline_rollback — directive name; taudit has no CLI rollback for
# baselines (baselines are content-addressed and idempotent). The directive
# is satisfied by mapping to `baseline diff`, which is the authoritative
# pre-rollback comparison surface and is Observe-only. Re-naming reflects
# operator intent; semantics are explicit in the description.
# -----------------------------------------------------------------------------

[[tools]]
name = "taudit_baseline_rollback"
title = "Inspect baseline drift"
description = "Compare pipeline findings against the stored baseline (taudit's `baseline diff`). No write occurs; the result drives any manual rollback decision."
command = ["baseline", "diff"]

[tools.args.paths]
type = "path"
required = true
description = "Pipeline path(s); files or directories"
position = 1
must_exist = true
within_workspace = true

[tools.args.root]
type = "path"
required = false
description = "Repository root under which `.taudit/baselines/` lives"
flag = "--root"
within_workspace = true

[tools.args.platform]
type = "enum"
required = false
description = "CI/CD platform; default is auto-detect"
flag = "--platform"
values = ["auto", "github-actions", "azure-devops", "gitlab", "bitbucket"]

[tools.args.max_hops]
type = "integer"
required = false
description = "Maximum propagation depth"
flag = "--max-hops"

[tools.args.invariants_dir]
type = "path"
required = false
description = "Directory containing Authority Invariant YAML files"
flag = "--invariants-dir"
within_workspace = true

[tools.output]
mode = "text"
max_bytes = 1048576
expose_stderr = false

[tools.policy]
authority = "Observe"
read_only = true
network = false
writes_files = false
approval = "never"
timeout_seconds = 300

[tools.env]
inherit = false
allow = []

# -----------------------------------------------------------------------------
# taudit_remediate_suggest — read-only remediation discovery. Observe.
