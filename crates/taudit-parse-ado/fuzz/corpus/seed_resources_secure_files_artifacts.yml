trigger: none

resources:
  containers:
    - container: build_image
      image: alpine:3.20
      endpoint: dockerhub-prod
  pipelines:
    - pipeline: upstream_security_build
      source: security-ci
      trigger: true
  packages:
    - package: shared_tooling
      type: npm
      connection: npm-prod
      name: "@contoso/tooling"

jobs:
  - job: build
    container: build_image
    steps:
      - task: DownloadSecureFile@1
        inputs:
          secureFile: codesign-prod.p12
      - task: PublishPipelineArtifact@1
        inputs:
          targetPath: "$(Pipeline.Workspace)/drop"
          artifact: signed-drop
      - task: DownloadPipelineArtifact@2
        inputs:
          artifactName: signed-drop
          targetPath: "$(Pipeline.Workspace)/downloaded"
