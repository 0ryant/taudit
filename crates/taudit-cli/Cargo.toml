[package]
name = "taudit"
description = "Pipeline authority scanner — models how secrets and permissions move through CI/CD pipelines"
version = "0.2.6"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
keywords.workspace = true
categories.workspace = true
readme = "../../README.md"

[[bin]]
name = "taudit"
path = "src/main.rs"

[dependencies]
taudit-core = { version = "0.2.6", path = "../taudit-core" }
taudit-parse-gha = { version = "0.2.6", path = "../taudit-parse-gha" }
taudit-parse-ado = { version = "0.2.6", path = "../taudit-parse-ado" }
taudit-report-terminal = { version = "0.2.6", path = "../taudit-report-terminal" }
taudit-report-json = { version = "0.2.6", path = "../taudit-report-json" }
taudit-report-sarif = { version = "0.2.6", path = "../taudit-report-sarif" }
taudit-sink-cloudevents = { version = "0.2.6", path = "../taudit-sink-cloudevents" }
clap = { workspace = true }
clap_complete = { workspace = true }
anyhow = { workspace = true }
serde_yaml = { workspace = true }
serde_json = { workspace = true }
colored = { workspace = true }

[dev-dependencies]
serde_json = { workspace = true }
serde_yaml = { workspace = true }
