[package]
name = "taudit"
description = "Pipeline authority scanner — models how secrets and permissions move through CI/CD pipelines"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
keywords.workspace = true
categories.workspace = true
readme = "../../README.md"

[[bin]]
name = "taudit"
path = "src/main.rs"

[dependencies]
taudit-core = { path = "../taudit-core" }
taudit-parse-gha = { path = "../taudit-parse-gha" }
taudit-report-terminal = { path = "../taudit-report-terminal" }
taudit-report-json = { path = "../taudit-report-json" }
taudit-report-sarif = { path = "../taudit-report-sarif" }
taudit-sink-cloudevents = { path = "../taudit-sink-cloudevents" }
clap = { workspace = true }
anyhow = { workspace = true }
serde_yaml = { workspace = true }
serde_json = { workspace = true }
colored = { workspace = true }

[dev-dependencies]
serde_json = { workspace = true }
serde_yaml = { workspace = true }
