[workspace]
resolver = "2"
members = [
    "crates/taudit-core",
    "crates/taudit-cli",
    "crates/taudit-parse-gha",
    "crates/taudit-report-terminal",
    "crates/taudit-report-json",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
rust-version = "1.85"
license = "MIT OR Apache-2.0"
authors = ["Keith Tilcock"]

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
thiserror = "2"
anyhow = "1"
clap = { version = "4", features = ["derive"] }
colored = "2"

[profile.release]
lto = true
codegen-units = 1
strip = true
opt-level = 3
