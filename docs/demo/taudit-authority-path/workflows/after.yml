name: Developer Tool Authority Path

# AFTER — remediated workflow. The exploitable authority chain is removed:
#   1. Least privilege: the default token is read-only at the top level;
#      each job is granted only the authority it actually needs.
#   2. Every action is pinned to an immutable full-length commit SHA, so a
#      moved tag can no longer swap executable code under a trusted name.
#   3. Deploy secrets are sourced from the protected `production`
#      environment and reach only the (now immutable) deploy step.
#
# NOTE: this workflow is synthetic. vendor/deploy-action does not exist;
# its SHA is an illustrative placeholder for "any third-party deploy
# action, pinned to a commit you have reviewed." Pin real actions to the
# exact SHA published for the release you trust.

on:
  push:
    branches: [main]

# Read-only by default. Jobs opt in to more only where required.
permissions:
  contents: read

jobs:
  build:
    name: Build package
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Upload release bundle
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: release-bundle
          path: dist/

  deploy:
    name: Deploy production
    runs-on: ubuntu-latest
    needs: build
    environment: production
    # Only the authority the deploy step needs. No packages:write.
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download release bundle
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: release-bundle

      - name: Third-party production deploy
        uses: vendor/deploy-action@9f3a5c1b2d7e4f60a8b9c0d1e2f3a4b5c6d7e8f9 # pinned, reviewed commit
        with:
          release-token: ${{ secrets.RELEASE_TOKEN }}
          prod-api-key: ${{ secrets.PROD_API_KEY }}
        env:
          CLOUD_DEPLOY_TOKEN: ${{ secrets.CLOUD_DEPLOY_TOKEN }}
