# Example: required PR check — pin taudit, run verify (ADR 0003).
# Copy into .github/workflows/ and adjust paths / policy directory.
name: taudit policy gate
on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - ".taudit/**"
      - "invariants/**"

permissions:
  contents: read

jobs:
  taudit-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install taudit (pin major.minor for reproducible CI)
        run: cargo install taudit --version 1.1.2 --locked

      - name: Verify authority invariants (exit 0 = pass, 1 = violations, 2 = config/parse error)
        run: taudit verify --policy .taudit/policy/ .github/workflows/
