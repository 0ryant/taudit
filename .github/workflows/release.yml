name: release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write
  id-token: write  # required for SLSA provenance attestation

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@98e1b82157cd469e843cb7f524c1313b4ad9492c # 1.88
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8

      - name: fmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: test
        run: cargo test --workspace

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: cargo deny
        run: cargo deny check licenses bans sources

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: cargo audit
        run: cargo audit

  # Create the GitHub release from the pushed tag before any build jobs run.
  create-release:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Create GitHub release
        run: |
          gh release view "${{ github.ref_name }}" 2>/dev/null || \
          gh release create "${{ github.ref_name }}" \
            --generate-notes \
            --draft=false \
            --title "taudit ${{ github.ref_name }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sbom:
    name: dependency sbom (SPDX + CycloneDX)
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@98e1b82157cd469e843cb7f524c1313b4ad9492c # 1.88

      - name: Install cargo-sbom
        run: cargo install cargo-sbom --locked --version '^0.9'

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked

      # SPDX 2.3 — produced first to preserve the existing artifact name
      # downstream consumers may already pin against.
      - name: Generate SPDX SBOM
        run: cargo sbom --output-format spdx_json_2_3 > taudit-${{ github.ref_name }}.spdx.json

      # CycloneDX 1.5 — second SBOM format for tools that expect
      # CycloneDX (Dependency-Track, Trivy, Grype, etc). Written next
      # to the binary crate manifest then renamed to a stable filename.
      - name: Generate CycloneDX SBOM
        run: |
          cargo cyclonedx --format json --spec-version 1.5 --target-in-filename --all
          # cargo-cyclonedx writes one file per crate next to its
          # Cargo.toml; pick up the workspace-root binary crate's SBOM.
          BIN_SBOM=$(find crates/taudit-cli -maxdepth 2 -name 'taudit_*.cdx.json' | head -1)
          if [ -z "$BIN_SBOM" ]; then
            BIN_SBOM=$(find crates/taudit-cli -maxdepth 2 -name '*.cdx.json' | head -1)
          fi
          if [ -z "$BIN_SBOM" ]; then
            echo "::error::cargo-cyclonedx produced no SBOM under crates/taudit-cli"
            exit 1
          fi
          cp "$BIN_SBOM" "taudit-${{ github.ref_name }}.cyclonedx.json"

      - name: Upload SBOMs
        run: |
          gh release upload "${{ github.ref_name }}" \
            "taudit-${{ github.ref_name }}.spdx.json" \
            "taudit-${{ github.ref_name }}.cyclonedx.json" \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: build ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: taudit-x86_64-linux.tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: taudit-aarch64-linux.tar.gz
            use_cross: true
          - os: macos-13
            target: x86_64-apple-darwin
            archive: taudit-x86_64-macos.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: taudit-aarch64-macos.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: taudit-x86_64-windows.zip

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@98e1b82157cd469e843cb7f524c1313b4ad9492c # 1.88
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
        with:
          key: ${{ matrix.target }}

      # cross handles Linux arm64 via Docker-based cross compilation.
      - name: Install cross
        if: matrix.use_cross == true
        run: cargo install cross --locked

      - name: Build (cross — Linux arm64)
        if: matrix.use_cross == true
        run: cross build --release --target ${{ matrix.target }} -p taudit

      - name: Build (native)
        if: matrix.use_cross != true
        run: cargo build --release --target ${{ matrix.target }} -p taudit

      # --- Package ---

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/taudit dist/
          tar czf ${{ matrix.archive }} -C dist taudit
          sha256sum ${{ matrix.archive }} > ${{ matrix.archive }}.sha256

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item target/${{ matrix.target }}/release/taudit.exe dist/
          Compress-Archive -Path dist/taudit.exe -DestinationPath ${{ matrix.archive }}
          $hash = (Get-FileHash ${{ matrix.archive }} -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.archive }}" | Out-File -Encoding ascii "${{ matrix.archive }}.sha256"

      # --- Upload to release ---

      - name: Upload artifact
        run: gh release upload "${{ github.ref_name }}" "${{ matrix.archive }}" "${{ matrix.archive }}.sha256" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Aggregate SHA256 hashes from all binary build legs and encode them
  # as base64 for the SLSA generator. Runs once after all matrix legs finish.
  hash-aggregate:
    name: aggregate build hashes (SLSA)
    needs: [build]
    runs-on: ubuntu-latest
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - name: Download release binaries and compute SHA256
        id: hash
        run: |
          gh release download "${{ github.ref_name }}" \
            --pattern "taudit-*.tar.gz" \
            --pattern "taudit-*.zip"
          # sha256sum produces "<hash>  <filename>" lines — exactly what the
          # SLSA generator expects before base64 encoding.
          sha256sum taudit-*.tar.gz taudit-*.zip | tee hashes.txt
          echo "hashes=$(base64 -w0 < hashes.txt)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # SLSA L3 provenance — verifiable via `slsa-verifier verify-artifact`.
  provenance:
    name: SLSA L3 provenance
    needs: [hash-aggregate]
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: "${{ needs.hash-aggregate.outputs.hashes }}"
      upload-assets: true

  publish:
    name: Publish to crates.io
    needs:
      - create-release
      - sbom
      - build
      - provenance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@98e1b82157cd469e843cb7f524c1313b4ad9492c # 1.88

      - name: Publish to crates.io
        run: cargo publish --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"
