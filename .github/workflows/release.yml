name: release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'        # stable: v1.1.0
      - 'v[0-9]+.[0-9]+.[0-9]+-*'      # prerelease: v1.1.0-beta.1, v1.1.0-rc.2 (ADR 0004)

# Minimal workflow-level permissions; jobs that need more declare it themselves.
permissions:
  contents: write

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@98e1b82157cd469e843cb7f524c1313b4ad9492c # 1.88
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8

      - name: fmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: test
        run: cargo test --workspace

      # Per the v1.1.0-beta.3 API stability policy: `taudit-core` is workspace-
      # internal but its `pub` items are still in the technical ABI; an
      # accidental signature change between minor versions would break any
      # external consumer pinning a specific minor. `cargo semver-checks`
      # guards against that. The `--baseline-rev` is omitted so the tool
      # diffs against the latest matching version on crates.io — on the very
      # first publish of any crate the tool reports "no baseline" and exits 0,
      # so this step is a no-op for first releases.
      - name: Install cargo-semver-checks
        if: ${{ !contains(github.ref_name, '-') }}
        run: cargo install cargo-semver-checks --locked --quiet

      - name: cargo semver-checks
        if: ${{ !contains(github.ref_name, '-') }}
        run: cargo semver-checks check-release --workspace --all-features

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: cargo deny
        run: cargo deny check licenses bans sources

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: cargo audit
        run: cargo audit

  # Create the GitHub release from the pushed tag before any build jobs run.
  create-release:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Create GitHub release
        # Prerelease detection: a tag containing `-` is a semver pre-release
        # (e.g. v1.1.0-beta.1). Stable tags (v1.1.0) get the default Latest
        # badge; prerelease tags get --prerelease, which removes the Latest
        # badge and excludes the release from `gh release view --latest`.
        # crates.io publishing happens in both cases — Cargo's resolver gates
        # consumers from accidentally picking up a prerelease. See ADR 0004
        # and docs/release-strategy.md §4.
        #
        # Tag is read from $TAG (env-var indirection) rather than expanded
        # directly into the shell — defends against script injection if a
        # future tag name contained shell metacharacters.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          prerelease_flag=""
          case "$TAG" in
            *-*) prerelease_flag="--prerelease" ;;
          esac
          gh release view "$TAG" 2>/dev/null || \
          gh release create "$TAG" \
            --generate-notes \
            --draft=false \
            $prerelease_flag \
            --title "taudit $TAG"

  sbom:
    name: dependency sbom (SPDX + CycloneDX)
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write      # OIDC token for attestation signing
      attestations: write  # write attestations to GitHub's store
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@98e1b82157cd469e843cb7f524c1313b4ad9492c # 1.88

      - name: Install cargo-sbom
        run: cargo install cargo-sbom --locked --version '^0.9'

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked

      # SPDX 2.3 — produced first to preserve the existing artifact name
      # downstream consumers may already pin against.
      - name: Generate SPDX SBOM
        run: cargo sbom --output-format spdx_json_2_3 > taudit-${{ github.ref_name }}.spdx.json

      # CycloneDX 1.5 — second SBOM format for tools that expect
      # CycloneDX (Dependency-Track, Trivy, Grype, etc). Written next
      # to the binary crate manifest then renamed to a stable filename.
      - name: Generate CycloneDX SBOM
        run: |
          cargo cyclonedx --format json --spec-version 1.5 --target-in-filename --all
          BIN_SBOM=$(find crates/taudit-cli -maxdepth 2 -name 'taudit_*.cdx.json' | head -1)
          if [ -z "$BIN_SBOM" ]; then
            BIN_SBOM=$(find crates/taudit-cli -maxdepth 2 -name '*.cdx.json' | head -1)
          fi
          if [ -z "$BIN_SBOM" ]; then
            echo "::error::cargo-cyclonedx produced no SBOM under crates/taudit-cli"
            exit 1
          fi
          cp "$BIN_SBOM" "taudit-${{ github.ref_name }}.cyclonedx.json"

      # Attest both SBOM documents before uploading — attestations are stored
      # in GitHub's immutable attestation store and verifiable with:
      #   gh attestation verify taudit-<ver>.spdx.json --repo 0ryant/taudit
      - name: Attest SPDX SBOM
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: taudit-${{ github.ref_name }}.spdx.json

      - name: Attest CycloneDX SBOM
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: taudit-${{ github.ref_name }}.cyclonedx.json

      - name: Upload SBOMs
        run: |
          gh release upload "${{ github.ref_name }}" \
            "taudit-${{ github.ref_name }}.spdx.json" \
            "taudit-${{ github.ref_name }}.cyclonedx.json" \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: build ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
      id-token: write      # OIDC token for attestation signing
      attestations: write  # write attestations to GitHub's store
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: taudit-x86_64-linux.tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: taudit-aarch64-linux.tar.gz
            use_cross: true
          - os: macos-15-intel
            target: x86_64-apple-darwin
            archive: taudit-x86_64-macos.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: taudit-aarch64-macos.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: taudit-x86_64-windows.zip

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@98e1b82157cd469e843cb7f524c1313b4ad9492c # 1.88
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
        with:
          key: ${{ matrix.target }}

      # cross handles Linux arm64 via Docker-based cross compilation.
      - name: Install cross
        if: matrix.use_cross == true
        run: cargo install cross --locked

      - name: Build (cross — Linux arm64)
        if: matrix.use_cross == true
        run: cross build --release --target ${{ matrix.target }} -p taudit

      - name: Build (native)
        if: matrix.use_cross != true
        run: cargo build --release --target ${{ matrix.target }} -p taudit

      # --- Package ---

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/taudit dist/
          tar czf ${{ matrix.archive }} -C dist taudit
          sha256sum ${{ matrix.archive }} > ${{ matrix.archive }}.sha256

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item target/${{ matrix.target }}/release/taudit.exe dist/
          Compress-Archive -Path dist/taudit.exe -DestinationPath ${{ matrix.archive }}
          $hash = (Get-FileHash ${{ matrix.archive }} -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.archive }}" | Out-File -Encoding ascii "${{ matrix.archive }}.sha256"

      # Attest build provenance for this archive. The attestation is stored in
      # GitHub's immutable attestation store (not the release assets) and is
      # verifiable offline:
      #   gh attestation verify taudit-x86_64-linux.tar.gz --repo 0ryant/taudit
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: ${{ matrix.archive }}

      # --- Upload to release ---

      - name: Upload artifact
        run: gh release upload "${{ github.ref_name }}" "${{ matrix.archive }}" "${{ matrix.archive }}.sha256" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish to crates.io
    needs:
      - create-release
      - sbom
      - build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@98e1b82157cd469e843cb7f524c1313b4ad9492c # 1.88

      - name: Publish to crates.io
        # Cargo 1.88 still keeps `cargo publish --workspace` unstable, so
        # publish explicitly in dependency order and wait briefly for registry
        # index propagation between workspace crates. The existence check makes
        # reruns safe after a partial publish.
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          : "${CARGO_REGISTRY_TOKEN:?GitHub secret CARGO_REGISTRY_TOKEN is required}"

          version_for() {
            cargo metadata --no-deps --format-version 1 |
              python3 -c '
          import json, sys
          crate = sys.argv[1]
          data = json.load(sys.stdin)
          for package in data["packages"]:
              if package["name"] == crate:
                  print(package["version"])
                  break
          else:
              raise SystemExit(f"crate not found in workspace: {crate}")
          ' "$1"
          }

          publish_one() {
            crate="$1"
            version="$(version_for "$crate")"
            if cargo info "${crate}@${version}" --registry crates-io >/dev/null 2>&1; then
              echo "${crate}@${version} already exists on crates.io; skipping"
              return
            fi
            cargo publish -p "$crate" --token "$CARGO_REGISTRY_TOKEN"
            sleep 60
          }

          publish_one taudit-api
          publish_one taudit-core
          publish_one taudit-parse-ado
          publish_one taudit-parse-bitbucket
          publish_one taudit-parse-gha
          publish_one taudit-parse-gitlab
          publish_one taudit-report-json
          publish_one taudit-report-sarif
          publish_one taudit-report-terminal
          publish_one taudit-sink-cloudevents
          publish_one taudit
