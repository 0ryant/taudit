name: release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  # Create the GitHub release from the pushed tag before any build jobs run.
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Create GitHub release
        run: |
          gh release view "${{ github.ref_name }}" 2>/dev/null || \
          gh release create "${{ github.ref_name }}" \
            --generate-notes \
            --draft=false \
            --title "taudit ${{ github.ref_name }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: build ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: taudit-x86_64-linux.tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: taudit-aarch64-linux.tar.gz
            use_cross: true
          - os: macos-13
            target: x86_64-apple-darwin
            archive: taudit-x86_64-macos.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: taudit-aarch64-macos.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: taudit-x86_64-windows.zip

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@98e1b82157cd469e843cb7f524c1313b4ad9492c # 1.88
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
        with:
          key: ${{ matrix.target }}

      # cross handles Linux arm64 via Docker-based cross compilation.
      - name: Install cross
        if: matrix.use_cross == true
        run: cargo install cross --locked

      - name: Build (cross — Linux arm64)
        if: matrix.use_cross == true
        run: cross build --release --target ${{ matrix.target }} -p taudit

      - name: Build (native)
        if: matrix.use_cross != true
        run: cargo build --release --target ${{ matrix.target }} -p taudit

      # --- Package ---

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/taudit dist/
          tar czf ${{ matrix.archive }} -C dist taudit

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item target/${{ matrix.target }}/release/taudit.exe dist/
          Compress-Archive -Path dist/taudit.exe -DestinationPath ${{ matrix.archive }}

      # --- Upload to release ---

      - name: Upload artifact
        run: gh release upload "${{ github.ref_name }}" "${{ matrix.archive }}" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
