# Cross-repo stack smoke: taudit authority scans on sibling workflow trees,
# plus CellOS supervisor running taudit in an execution cell.
#
# CellOS: prefer image from ghcr.io (build via publish-cellos-ghcr.yml); if
# pull fails, fall back to cloning the CellOS repo and scripts/cellos_smoke.sh.
# tsafe is a *scan target* only — the tsafe vault CLI is not invoked in CI.
#
# Variables (Settings → Variables): SIBLING_TSAFE_REPO, SIBLING_CELLOS_REPO,
# CELLOS_SUPERVISOR_IMAGE (full override), CELLOS_SUPERVISOR_TAG (default tag
# when image override is unset; default main).
name: stack-integration

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  stack-smoke:
    name: taudit + tsafe + CellOS (sibling checkouts)
    runs-on: ubuntu-latest
    # Fork PRs: skip — default GITHUB_TOKEN cannot read base-org private siblings.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@98e1b82157cd469e843cb7f524c1313b4ad9492c # 1.88

      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
        with:
          key: stack-integration

      - name: Build taudit (release)
        run: cargo build --release -p taudit

      - name: Resolve sibling repository ids
        id: siblings
        shell: bash
        env:
          SIBLING_TSAFE_REPO: ${{ vars.SIBLING_TSAFE_REPO }}
          SIBLING_CELLOS_REPO: ${{ vars.SIBLING_CELLOS_REPO }}
        run: |
          owner="${GITHUB_REPOSITORY%%/*}"
          tsafe_repo="${SIBLING_TSAFE_REPO:-${owner}/tsafe}"
          cellos_repo="${SIBLING_CELLOS_REPO:-${owner}/CellOS}"
          echo "tsafe_repo=${tsafe_repo}" >> "${GITHUB_OUTPUT}"
          echo "cellos_repo=${cellos_repo}" >> "${GITHUB_OUTPUT}"
          echo "Using sibling tsafe repo: ${tsafe_repo}"
          echo "Using sibling CellOS repo: ${cellos_repo}"

      - name: Checkout tsafe (sibling)
        id: checkout_tsafe
        continue-on-error: true
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: ${{ steps.siblings.outputs.tsafe_repo }}
          path: _siblings/tsafe
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: taudit scan tsafe GitHub workflows
        if: steps.checkout_tsafe.outcome == 'success'
        env:
          TAUDIT_CORRELATION_ID: stack-tsafe-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          set -euo pipefail
          wf="_siblings/tsafe/.github/workflows"
          if [[ ! -d "${wf}" ]]; then
            echo "::notice::tsafe checkout has no .github/workflows — skipping scan"
            exit 0
          fi
          ./target/release/taudit scan "${wf}/" \
            --platform github-actions \
            --severity-threshold high \
            --quiet

      - name: Notice when tsafe sibling is unavailable
        if: steps.checkout_tsafe.outcome != 'success'
        run: |
          echo "::notice::tsafe sibling checkout failed or repo missing. Set repository variable SIBLING_TSAFE_REPO (owner/name) or ensure GITHUB_TOKEN can read ${{ steps.siblings.outputs.tsafe_repo }}."

      - name: Log in to GHCR (CellOS supervisor image)
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve CellOS supervisor image
        id: cellos_img
        shell: bash
        env:
          OVERRIDE: ${{ vars.CELLOS_SUPERVISOR_IMAGE }}
          OWNER: ${{ github.repository_owner }}
          TAG: ${{ vars.CELLOS_SUPERVISOR_TAG }}
        run: |
          tag="${TAG:-main}"
          if [[ -n "${OVERRIDE}" ]]; then
            echo "image=${OVERRIDE}" >> "${GITHUB_OUTPUT}"
          else
            echo "image=ghcr.io/${OWNER}/cellos-supervisor:${tag}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Pull CellOS supervisor image
        id: cellos_pull
        continue-on-error: true
        run: docker pull "${{ steps.cellos_img.outputs.image }}"

      - name: CellOS smoke (supervisor from GHCR)
        if: steps.cellos_pull.outcome == 'success'
        env:
          CELLOS_SUPERVISOR_IMAGE: ${{ steps.cellos_img.outputs.image }}
          TAUDIT_BIN: ${{ github.workspace }}/target/release/taudit
          TAUDIT_CORRELATION_ID: stack-cellos-${{ github.run_id }}-${{ github.run_attempt }}
        run: bash scripts/cellos_smoke_docker.sh

      - name: Checkout CellOS (sibling, fallback when GHCR image unavailable)
        if: steps.cellos_pull.outcome != 'success'
        id: checkout_cellos
        continue-on-error: true
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: ${{ steps.siblings.outputs.cellos_repo }}
          path: _siblings/cellos
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: CellOS smoke (supervisor built from sibling checkout)
        if: steps.cellos_pull.outcome != 'success' && steps.checkout_cellos.outcome == 'success'
        env:
          CELLOS_REPO: ${{ github.workspace }}/_siblings/cellos
          TAUDIT_BIN: ${{ github.workspace }}/target/release/taudit
          TAUDIT_CORRELATION_ID: stack-cellos-${{ github.run_id }}-${{ github.run_attempt }}
        run: bash scripts/cellos_smoke.sh

      - name: Notice when CellOS image pull and sibling checkout both failed
        if: steps.cellos_pull.outcome != 'success' && steps.checkout_cellos.outcome != 'success'
        run: |
          echo "::notice::CellOS GHCR pull failed (${{ steps.cellos_img.outputs.image }}) and sibling checkout failed (${{ steps.siblings.outputs.cellos_repo }}). Run publish-cellos-ghcr workflow once, or set CELLOS_SUPERVISOR_IMAGE / SIBLING_CELLOS_REPO."
