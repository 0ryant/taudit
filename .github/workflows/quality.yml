name: quality

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Rust test suite on all three OSes — catches path-separator bugs and
  # platform-specific YAML parsing differences invisible on ubuntu-only CI.
  test-matrix:
    name: "test (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@98e1b82157cd469e843cb7f524c1313b4ad9492c # 1.88

      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
        with:
          key: ${{ matrix.os }}

      - name: test
        run: cargo test --workspace

  quality:
    runs-on: ubuntu-latest
    # Whole-job ceiling so a hung step cannot occupy runners indefinitely (see mutants step timeout).
    timeout-minutes: 120
    steps:
      # Pinned SHAs (SEC-10): tag in comment; verify at https://github.com/<org>/<repo>/releases
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@98e1b82157cd469e843cb7f524c1313b4ad9492c # 1.88
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8

      - name: fmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Install cargo-insta
        run: cargo install cargo-insta --locked

      - name: test + snapshot review (reject unreferenced snaps)
        run: cargo insta test --workspace --unreferenced reject

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: cargo deny
        run: cargo deny check licenses bans sources

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: cargo audit
        run: cargo audit

      - name: Install governance tooling (Trivy, Checkov, Gitleaks)
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release python3-pip

          # Trivy
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

          # Checkov
          python3 -m pip install --user checkov
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

          # Gitleaks
          GITLEAKS_VERSION=8.24.2
          wget -q "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf "gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks

      - name: Governance quality gate (Trivy, Checkov, Gitleaks, taudit)
        run: bash scripts/quality-gate.sh ci-governance

      - name: Validate report and CloudEvents contracts
        run: |
          cargo test -p taudit-report-json
          cargo test -p taudit-sink-cloudevents

      # Build once in release; reuse for self-scan + verify steps below.
      - name: Build taudit (release)
        run: cargo build --release -p taudit

      - name: Golden paths smoke (docs/golden-paths.md)
        run: TAUDIT_BIN=target/release/taudit bash scripts/golden-paths.sh

      # Informational — taudit scan always exits 0 in v0.7+; we surface
      # findings via SARIF artifact + a CI warning if the threshold is hit.
      - name: taudit self-scan (SARIF)
        run: |
          ./target/release/taudit scan .github/workflows/ \
            --platform github-actions \
            --severity-threshold high \
            --format sarif \
            > taudit-self-scan.sarif \
            || (echo "::error::taudit scan failed against own workflows" && exit 1)

      - name: Upload self-scan SARIF
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: taudit-self-scan-sarif
          path: taudit-self-scan.sarif
          if-no-files-found: error
          retention-days: 30

      # Gate: enforce starter invariants on our own workflows. Treat
      # violations as advisory until the starter bundle stabilises (the
      # `|| true` lets us land the wiring without breaking main on
      # pre-existing issues — flip to a hard fail in a follow-up).
      - name: taudit verify (starter invariants)
        if: hashFiles('invariants/starter/*.yml') != ''
        run: |
          ./target/release/taudit verify \
            --policy invariants/starter/ \
            --platform github-actions \
            .github/workflows/ \
            || echo "::warning::taudit verify found policy violations against starter invariants"

      # Gate: ensure the example ADO policy file still parses + matches
      # zero false-positives on a known-clean fixture as the DSL evolves.
      - name: taudit verify (example ADO policy parses)
        if: hashFiles('invariants/policies/example-enterprise-ado.yml') != '' && hashFiles('tests/fixtures/clean.yml') != ''
        run: |
          ./target/release/taudit verify \
            --policy invariants/policies/example-enterprise-ado.yml \
            --platform azure-devops \
            tests/fixtures/clean.yml \
            || echo "::warning::example-enterprise-ado policy reported violations on clean fixture"

      # Fuzz smoke: build each parser fuzz target with nightly and run for
      # 10 s per target. Catches panics on startup and trivial crash inputs
      # without running a full fuzzing campaign.
      # Runs on push to main only — nightly install + 30s fuzz time is too
      # slow to impose on every PR.
      - name: Install nightly toolchain and cargo-fuzz
        if: github.event_name == 'push'
        run: |
          rustup toolchain install nightly --no-self-update
          cargo +nightly install cargo-fuzz --locked

      - name: fuzz smoke (parse_gha — 10 s)
        if: github.event_name == 'push'
        run: cargo +nightly fuzz run parse_gha -- -max_total_time=10
        working-directory: crates/taudit-parse-gha

      - name: fuzz smoke (parse_ado — 10 s)
        if: github.event_name == 'push'
        run: cargo +nightly fuzz run parse_ado -- -max_total_time=10
        working-directory: crates/taudit-parse-ado

      - name: fuzz smoke (parse_gitlab — 10 s)
        if: github.event_name == 'push'
        run: cargo +nightly fuzz run parse_gitlab -- -max_total_time=10
        working-directory: crates/taudit-parse-gitlab

      # Mutation coverage for the rule engine — informational, exits 0.
      # Runs on push to main only; skip on PRs to avoid 20-40 min CI cost.
      - name: Install cargo-mutants
        if: github.event_name == 'push'
        run: cargo install cargo-mutants --locked

      - name: mutation coverage (taudit-core — informational)
        if: github.event_name == 'push'
        timeout-minutes: 50
        run: cargo mutants -p taudit-core --timeout 45
