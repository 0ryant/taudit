name: quality

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      # Pinned SHAs (SEC-10): tag in comment; verify at https://github.com/<org>/<repo>/releases
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@98e1b82157cd469e843cb7f524c1313b4ad9492c # 1.88
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8

      - name: fmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: test
        run: cargo test --workspace

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: cargo deny
        run: cargo deny check licenses bans sources

      - name: Validate JSON contracts
        run: |
          python3 -c "
          import json, os, sys
          schema_dir = 'contracts/schemas'
          example_dir = 'contracts/examples'
          errors = 0
          for f in os.listdir(example_dir):
              if not f.endswith('.json'):
                  continue
              path = os.path.join(example_dir, f)
              try:
                  with open(path) as fh:
                      json.load(fh)
                  print(f'  OK: {path}')
              except json.JSONDecodeError as e:
                  print(f'  FAIL: {path}: {e}', file=sys.stderr)
                  errors += 1
          for f in os.listdir(schema_dir):
              if not f.endswith('.json'):
                  continue
              path = os.path.join(schema_dir, f)
              try:
                  with open(path) as fh:
                      json.load(fh)
                  print(f'  OK: {path}')
              except json.JSONDecodeError as e:
                  print(f'  FAIL: {path}: {e}', file=sys.stderr)
                  errors += 1
          sys.exit(1 if errors else 0)
          "
