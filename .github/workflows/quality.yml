name: quality

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - '*.txt'
      - 'CHANGELOG*'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - '*.txt'
      - 'CHANGELOG*'
      - '.github/ISSUE_TEMPLATE/**'

# One active quality run per ref — superseded runs cancel so we do not burn
# runners on obsolete commits (especially on rapid pushes to main).
concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Rust test suite on all three OSes — catches path-separator bugs and
  # platform-specific YAML parsing differences invisible on ubuntu-only CI.
  test-matrix:
    name: "test (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: ${{ github.event_name == 'push' && fromJSON('["ubuntu-latest", "macos-latest", "windows-latest"]') || fromJSON('["ubuntu-latest"]') }}
      fail-fast: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@98e1b82157cd469e843cb7f524c1313b4ad9492c # 1.88

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.os }}

      - name: test
        run: cargo test --workspace

  quality:
    runs-on: ubuntu-latest
    # Whole-job ceiling so a hung step cannot occupy runners indefinitely (see mutants step timeout).
    timeout-minutes: 120
    steps:
      # Pinned SHAs (SEC-10): tag in comment; verify at https://github.com/<org>/<repo>/releases
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@98e1b82157cd469e843cb7f524c1313b4ad9492c # 1.88
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: fmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      # Ecosystem `quality` job order (standardise-ecosystem.md): fmt → clippy → test → deny → audit.
      - name: cargo test (workspace)
        run: cargo test --workspace

      # Authority invariant YAML: JSON Schema is generated from FindingCategory in
      # Rust — --check catches drift; validation ensures starter library matches schema.
      - name: Set up Python (invariant schema tooling)
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Authority invariant schema drift + starter YAML validation
        run: |
          pip install pyyaml jsonschema
          python3 scripts/generate-authority-invariant-schema.py --check
          python3 scripts/validate-authority-invariant-yaml.py invariants/starter

      - name: Install cargo-insta
        run: cargo install cargo-insta --locked

      - name: test + snapshot review (reject unreferenced snaps)
        run: cargo insta test --workspace --unreferenced reject

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: cargo deny
        run: cargo deny check licenses bans sources

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: cargo audit
        run: cargo audit

      # Governance tools + gate live in `.github/workflows/governance.yml` (job `governance`).

      - name: Validate report and CloudEvents contracts
        run: |
          cargo test -p taudit-report-json
          cargo test -p taudit-sink-cloudevents

      # Build once in release; reuse for self-scan + verify steps below.
      - name: Build taudit (release)
        run: cargo build --release -p taudit

      - name: Golden paths smoke (docs/golden-paths.md)
        run: TAUDIT_BIN=target/release/taudit bash scripts/golden-paths.sh

      # Informational — taudit scan always exits 0 in v0.7+; we surface
      # findings via SARIF artifact + a CI warning if the threshold is hit.
      - name: taudit self-scan (SARIF)
        env:
          TAUDIT_CORRELATION_ID: quality-taudit-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          ./target/release/taudit scan .github/workflows/ \
            --platform github-actions \
            --severity-threshold high \
            --format sarif \
            > taudit-self-scan.sarif \
            || (echo "::error::taudit scan failed against own workflows" && exit 1)

      - name: Upload self-scan SARIF
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: taudit-self-scan-sarif
          path: taudit-self-scan.sarif
          if-no-files-found: error
          retention-days: 30

      # Gate: enforce starter invariants on our own workflows. Treat
      # violations as advisory until the starter bundle stabilises (the
      # `|| true` lets us land the wiring without breaking main on
      # pre-existing issues — flip to a hard fail in a follow-up).
      - name: taudit verify (starter invariants)
        if: hashFiles('invariants/starter/*.yml') != ''
        run: |
          ./target/release/taudit verify \
            --policy invariants/starter/ \
            --platform github-actions \
            .github/workflows/ \
            || echo "::warning::taudit verify found policy violations against starter invariants"

      # Gate: ensure the example ADO policy file still parses + matches
      # zero false-positives on a known-clean fixture as the DSL evolves.
      - name: taudit verify (example ADO policy parses)
        if: hashFiles('invariants/policies/example-enterprise-ado.yml') != '' && hashFiles('tests/fixtures/clean.yml') != ''
        run: |
          ./target/release/taudit verify \
            --policy invariants/policies/example-enterprise-ado.yml \
            --platform azure-devops \
            tests/fixtures/clean.yml \
            || echo "::warning::example-enterprise-ado policy reported violations on clean fixture"

      # Fuzz smoke: see `.github/workflows/scheduled-fuzz.yml` (Tuesday) and
      # `workflow_dispatch` for the same targets (standardise-ecosystem.md).

      # Mutation testing moved to `.github/workflows/mutation-coverage.yml`
      # (weekly + workflow_dispatch). Running cargo-mutants inside this job
      # caused intermittent failures when the step was cancelled (runner
      # shutdown / superseded run) — cancelled steps still fail the job.
