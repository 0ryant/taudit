# Ecosystem governance gate — standardise-ecosystem.md (job name `governance`).
# Pins: scripts/tool-versions.env + scripts/install-governance-tools.sh
name: governance

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: governance-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  governance:
    name: governance
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@98e1b82157cd469e843cb7f524c1313b4ad9492c # 1.88.0 (see rust-toolchain.toml)
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: governance

      - name: Install governance stack (pinned tools)
        run: bash scripts/install-governance-tools.sh

      - name: Install workflow linters (actionlint, yamllint)
        run: bash scripts/install-ci-linters.sh

      - name: Governance gate (gitleaks, trivy, checkov, zizmor, linters, taudit, ecosystem)
        run: bash scripts/quality-gate.sh ci-governance
