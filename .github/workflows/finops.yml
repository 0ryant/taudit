# FinOps smoke: Terraform fmt/validate + optional Infracost breakdown.
# Requires repository secret INFRACOST_API_KEY for cost output (free tier at infracost.io).
# Without the secret, terraform checks still run; Infracost steps are skipped.
name: finops

on:
  push:
    branches: [main]
    paths:
      - "infra/finops-smoke/**"
      - ".github/workflows/finops.yml"
  pull_request:
    paths:
      - "infra/finops-smoke/**"
      - ".github/workflows/finops.yml"
  workflow_dispatch:
  schedule:
    - cron: "37 14 * * 1"

concurrency:
  group: finops-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  terraform-finops-smoke:
    name: Terraform + Infracost (smoke)
    runs-on: ubuntu-latest
    env:
      # Step `if:` cannot use `secrets.*` (actionlint / GHA); gate on env instead.
      INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }}
    defaults:
      run:
        working-directory: infra/finops-smoke
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      - name: Terraform format (check)
        run: terraform fmt -check -recursive

      - name: Terraform init (no backend)
        run: terraform init -backend=false -input=false

      - name: Terraform validate
        run: terraform validate

      - name: Install Infracost CLI
        if: ${{ env.INFRACOST_API_KEY != '' }}
        uses: infracost/actions/setup@d51fc54d23c9ad90f984b884257bd96dc2625067 # v4.1.0
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Infracost breakdown
        if: ${{ env.INFRACOST_API_KEY != '' }}
        run: infracost breakdown --path . --format table --show-skipped

      - name: Infracost skipped (no API key)
        if: ${{ env.INFRACOST_API_KEY == '' }}
        run: |
          echo "::notice::Set repository secret INFRACOST_API_KEY to enable Infracost (see infra/finops-smoke/README.md)."
