# Build CellOS `cellos-supervisor` from source and push to GitHub Container Registry
# (ghcr.io/<this-repo-owner>/cellos-supervisor). CellOS is expected on GitHub under
# the same org as taudit; GITHUB_TOKEN can clone private same-org repos. Consumed by
# stack-integration and local `scripts/cellos_smoke_docker.sh` after `docker login ghcr.io`.
#
# Default CellOS repo id: <github.repository_owner>/CellOS. Override with variable
# SIBLING_CELLOS_REPO (owner/name) if the repo name differs (e.g. lowercase `cellos`).
name: publish-cellos-ghcr

# Manual runs always build CellOS @ main (Checkov CKV_GHA_7: no workflow_dispatch
# inputs when the workflow is also push-triggered).
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'packaging/docker/cellos-supervisor/**'
      - '.github/workflows/publish-cellos-ghcr.yml'

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-cellos-ghcr-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: cellos-supervisor

jobs:
  docker:
    name: Build and push cellos-supervisor
    runs-on: ubuntu-latest
    if: github.event.repository.fork == false
    steps:
      - name: Checkout taudit (Dockerfile)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Resolve CellOS repository id and git ref
        id: cellos
        shell: bash
        env:
          SIBLING_CELLOS_REPO: ${{ vars.SIBLING_CELLOS_REPO }}
        run: |
          owner="${GITHUB_REPOSITORY%%/*}"
          repo="${SIBLING_CELLOS_REPO:-${owner}/CellOS}"
          ref="main"
          echo "repo=${repo}" >> "${GITHUB_OUTPUT}"
          echo "ref=${ref}" >> "${GITHUB_OUTPUT}"
          echo "Building CellOS from ${repo} @ ${ref}"

      - name: Checkout CellOS source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ steps.cellos.outputs.repo }}
          ref: ${{ steps.cellos.outputs.ref }}
          path: cellos-src
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Dockerfile lives in taudit repo; build context is CellOS checkout root.
      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ./cellos-src
          file: ${{ github.workspace }}/packaging/docker/cellos-supervisor/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:main
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
