name: taudit PR authority diff

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - "azure-pipelines*.yml"
      - "**/.pipelines/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  authority-diff:
    name: Authority graph diff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@98e1b82157cd469e843cb7f524c1313b4ad9492c # 1.88

      - name: Install taudit
        run: cargo install taudit --locked

      - name: Detect changed pipeline files
        id: changed
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}
          FILES=$(git diff --name-only "$BASE" "$HEAD" | grep -E '\.(yml|yaml)$' | head -20 || true)
          {
            echo "files<<EOF"
            echo "$FILES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run authority diff on each changed file
        id: diff
        if: steps.changed.outputs.files != ''
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          REPORT=""
          while IFS= read -r FILE; do
            [ -n "$FILE" ] || continue
            # Get base version of file (empty string if new)
            BASE_CONTENT=$(git show "${BASE}:${FILE}" 2>/dev/null || true)
            if [ -n "$BASE_CONTENT" ] && [ -f "$FILE" ]; then
              DIFF=$(echo "$BASE_CONTENT" | taudit diff - "$FILE" --no-color 2>&1 || true)
              if [ -n "$DIFF" ]; then
                REPORT="${REPORT}\n### \`${FILE}\`\n\`\`\`\n${DIFF}\n\`\`\`\n"
              fi
            fi
          done <<< "${FILES}"
          if [ -n "$REPORT" ]; then
            {
              echo "report<<EOF"
              echo -e "$REPORT"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi
        env:
          FILES: ${{ steps.changed.outputs.files }}

      - name: Post PR comment
        if: steps.diff.outputs.report != ''
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const body = `## taudit authority diff\n\n${process.env.REPORT}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
        env:
          REPORT: ${{ steps.diff.outputs.report }}

      - name: Scan head for findings
        run: |
          taudit scan . \
            --platform auto \
            --severity-threshold high \
            --quiet \
            || echo "::warning::taudit found high/critical findings in this PR"
